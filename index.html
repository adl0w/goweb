<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go Move Cloud</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <div id="runtime-error" class="runtime-error" hidden></div>

    <main class="layout">
      <section class="board-column">
        <section class="panel board-panel">
          <div class="panel-row">
            <div class="top-controls">
              <div class="size-picker">
                <label for="board-size">Board</label>
                <select id="board-size">
                  <option value="9">9x9</option>
                  <option value="13">13x13</option>
                  <option value="19" selected>19x19</option>
                </select>
              </div>
              <div class="palette-picker">
                <label for="palette-select">Palette</label>
                <select id="palette-select">
                  <option value="mono" selected>Ink</option>
                  <option value="paper">Sand</option>
                  <option value="sage">Mist</option>
                  <option value="coral">Coral</option>
                  <option value="slate">Slate</option>
                </select>
              </div>
              <label class="mode-toggle" for="dark-mode-toggle">
                <input id="dark-mode-toggle" type="checkbox">
                <span>Dark Mode</span>
              </label>
            </div>
          </div>

          <div class="board-status-box">
            <p id="status-text" class="status-text">Black to play on move 1.</p>
            <p id="move-info" class="move-info">Position 0</p>
          </div>

          <div class="board-main-area">
            <div class="play-controls">
              <button id="reset-btn" class="stone-button stone-button-white" type="button">Reset</button>
              <button id="pass-btn" class="stone-button stone-button-white" type="button">Pass</button>
              <section class="autoplay-box" aria-label="Autoplay controls">
                <p class="autoplay-title">Autoplay</p>
                <div class="autoplay-controls">
                  <button id="cpu-black-btn" class="stone-button stone-button-black computer-button" type="button" aria-label="Computer plays black">
                    <span class="computer-icon" aria-hidden="true"></span>
                  </button>
                  <button id="cpu-white-btn" class="stone-button stone-button-white computer-button" type="button" aria-label="Computer plays white">
                    <span class="computer-icon" aria-hidden="true"></span>
                  </button>
                  <label class="auto-count-control" for="auto-move-count">
                    <span>CPU picks from</span>
                    <input id="auto-move-count" type="number" min="1" max="3" value="2">
                  </label>
                </div>
              </section>
            </div>
            <div id="board-stage" class="pixi-stage board-stage" aria-label="Interactive Go board"></div>
          </div>

          <section class="board-display-box" aria-label="Board display controls">
            <label class="board-toggle" for="show-move-numbers">
              <input id="show-move-numbers" type="checkbox">
              <span>Show Move Numbers</span>
            </label>
            <label class="board-toggle" for="show-move-preview">
              <input id="show-move-preview" type="checkbox" checked>
              <span>Placement Preview</span>
            </label>
            <label class="board-toggle" for="show-children-labels">
              <input id="show-children-labels" type="checkbox">
              <span>Show Children Labels</span>
            </label>
          </section>
        </section>
      </section>

      <aside class="cloud-column">
        <section class="panel cloud-panel">
          <div class="cloud-toolbar">
            <div>
              <p id="analysis-meta" class="analysis-meta">Ready.</p>
            </div>
          </div>

          <div class="cloud-stage-wrap">
            <div id="cloud-stage" class="pixi-stage cloud-stage"></div>
            <details class="tree-popout-panel">
              <summary>
                <span>Node Visualizer</span>
                <span class="popout-arrow" aria-hidden="true">&#9656;</span>
              </summary>
              <div class="tree-controls">
                <label class="tree-control" for="tree-depth">
                  <span>branches</span>
                  <input id="tree-depth" type="range" min="1" max="8" value="3">
                </label>
                <label class="tree-control" for="tree-size">
                  <span>node size</span>
                  <input id="tree-size" type="range" min="70" max="150" value="100">
                </label>
                <label class="tree-control" for="tree-buffer">
                  <span>x spacing</span>
                  <input id="tree-buffer" type="range" min="40" max="220" value="100">
                </label>
                <label class="tree-control" for="tree-vbuffer">
                  <span>y spacing</span>
                  <input id="tree-vbuffer" type="range" min="40" max="220" value="100">
                </label>
                <label class="tree-control" for="tree-motion">
                  <span>motion</span>
                  <input id="tree-motion" type="range" min="0" max="100" value="50">
                </label>
              </div>
            </details>
            <div class="suggest-dock">
              <button id="analyze-btn" class="pill-button" type="button">Suggest Moves</button>
              <label class="suggest-slider" for="suggest-count">
                <span>Moves</span>
                <div class="node-notch-slider">
                  <div class="node-notch-line" aria-hidden="true"></div>
                  <div class="node-notch-marks" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                  </div>
                  <input id="suggest-count" type="range" min="1" max="4" step="1" value="2" aria-label="Moves to suggest">
                </div>
              </label>
            </div>
          </div>
          <div class="tree-tip" aria-label="Tree keyboard navigation hint">
            <span class="arrow-keys" aria-hidden="true">
              <span class="arrow-key">↑</span>
              <span class="arrow-key">↓</span>
              <span class="arrow-key">←</span>
              <span class="arrow-key">→</span>
            </span>
            <span>Navigate tree with arrow keys</span>
          </div>

          <details class="advanced-panel">
            <summary>Engine Endpoint</summary>
            <input id="engine-endpoint" type="text" placeholder="Optional local analysis bridge">
            <p class="advanced-copy">Leave empty to use the built-in demo evaluator.</p>
          </details>
        </section>
      </aside>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
